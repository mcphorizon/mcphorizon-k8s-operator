apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpkubernetesservers.mcp.k8s.io
spec:
  group: mcp.k8s.io
  scope: Namespaced
  names:
    plural: mcpkubernetesservers
    singular: mcpkubernetesserver
    kind: MCPKubernetesServer
    shortNames:
      - mcps
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - namespaces
                - ingress
                - auth
              properties:
                namespaces:
                  type: array
                  minItems: 1
                  items:
                    type: string
                ingress:
                  type: object
                  required:
                    - enabled
                    - host
                  properties:
                    enabled:
                      type: boolean
                    host:
                      type: string
                    path:
                      type: string
                      default: /mcp
                    ingressClassName:
                      type: string
                    tls:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        secretName:
                          type: string
                auth:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum:
                        - basic
                    basic:
                      type: object
                      required:
                        - secretName
                      properties:
                        secretName:
                          type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
