apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: automationx
  labels:
    app.kubernetes.io/name: mcp-kubernetes-operator
    app.kubernetes.io/component: mcp-server
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-kubernetes-operator
        app.kubernetes.io/component: mcp-server
        app: mcp-server
    spec:
      containers:
        - name: server
          image: registry.68.220.202.177.nip.io/mcpoperator-python:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OPERATOR_NAMESPACE
              value: automationx
            - name: REGISTRY_CONFIGMAP
              value: mcp-server-registry
            - name: SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
